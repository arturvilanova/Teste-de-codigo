<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Novo Projeto</title>
    
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }

        /* 1. FUNDO ESCURO */
        #modalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        #modalOverlay.ativo {
            opacity: 1;
            visibility: visible;
        }

        /* 2. CARD FLUTUANTE */
        .card-flutuante {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 360px;
            width: 85%;
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #modalOverlay.ativo .card-flutuante {
            transform: scale(1);
        }

        /* BOTÃO FECHAR */
        .botao-fechar {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 32px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }

        /* TEXTOS */
        .emoji-topo {
            font-size: 45px;
            margin-bottom: 10px;
            display: block;
        }
        
        .card-flutuante h2 {
            margin: 10px 0;
            color: #1a1a1a;
            font-size: 22px;
        }
        
        .card-flutuante p {
            color: #555;
            line-height: 1.5;
            font-size: 15px;
            margin-bottom: 25px;
        }

        /* OPÇÕES DE COMPARTILHAMENTO */
        .opcoes-share {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-share {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s, transform 0.2s;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-share:active {
            transform: scale(0.98);
        }

        /* Cores das Redes */
        .whatsapp { background-color: #25D366; }
        .whatsapp:hover { background-color: #1ebd5c; }
        
        .whatsapp-status { background-color: #128C7E; }
        .whatsapp-status:hover { background-color: #075e54; }

        .copiar { background-color: #555555; }
        .copiar:hover { background-color: #333333; }

        /* Alerta de Link Copiado */
        #copiadoAlerta {
            display: none;
            color: #128C7E;
            font-weight: bold;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Conteúdo do seu site -->
    <div style="padding: 40px; text-align: center; color: #333;">
        <h1>Seu Site Incrível</h1>
        <p>As pessoas verão este conteúdo ao fundo assim que fecharem o card.</p>
    </div>

    <!-- ESTRUTURA DO CARD -->
    <div id="modalOverlay">
        <div class="card-flutuante">
            <button class="botao-fechar" onclick="fecharCard()">&times;</button>
            <span class="emoji-topo">🚀</span>
            <h2>Me dá essa força?</h2>
            <p>Fico muito feliz por você estar aqui! Este é o meu novo projeto. Se puder me ajudar a divulgar, escolha uma opção abaixo:</p>
            
            <div class="opcoes-share">
                <!-- Enviar direto para um amigo no WhatsApp -->
                <button id="linkZap" class="btn-share whatsapp">
                    📲 Enviar para um amigo
                </button>

                <!-- Ir direto para a aba de Status -->
                <button id="linkStatus" class="btn-share whatsapp-status">
                    🤳 Postar no meu Status
                </button>

                <!-- Copiar o texto com o link para colar em qualquer lugar -->
                <button onclick="copiarTexto()" class="btn-share copiar">
                    🔗 Copiar link com mensagem
                </button>
                <div id="copiadoAlerta">Texto e link copiados com sucesso!</div>
            </div>
        </div>
    </div>

    <!-- SCRIPT CORRIGIDO -->
    <script>
        // CONFIGURAÇÕES DA SUA MENSAGEM OCULTA
        // Lembre-se de trocar o link abaixo pelo link oficial do seu GitHub Pages!
        const TEXTO_MENSAGEM = "Olha esse projeto incrível! 🚀\n\nAchei muito maneiro o novo site que estão fazendo e resolvi apoiar! Dá uma olhada você também:\n\n👉 https://meusite.com.br";

        const mensagemCodificada = encodeURIComponent(TEXTO_MENSAGEM);

        // FUNÇÃO INTELIGENTE QUE ABRE O WHATSAPP SEM TELA BRANCA
        function abrirWhatsapp() {
            // Protocolo direto para abrir o aplicativo no celular
            const linkApp = "whatsapp://send?text=" + mensagemCodificada;
            
            // Link de contingência para computadores
            const linkWeb = "https://whatsapp.com" + mensagemCodificada;

            // Identifica se o acesso está sendo feito por um celular
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile) {
                window.location.href = linkApp;
            } else {
                window.open(linkWeb, '_blank');
            }
        }

        // Vincula a função de abrir o WhatsApp aos cliques dos botões
        document.getElementById('linkZap').onclick = function() {
            abrirWhatsapp();
        };

        document.getElementById('linkStatus').onclick = function() {
            abrirWhatsapp();
        };

        // Abre o card automaticamente 1.5 segundos após carregar a página
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('modalOverlay').classList.add('ativo');
            }, 1500); 
        };

        // Fecha o card
        function fecharCard() {
            document.getElementById('modalOverlay').classList.remove('ativo');
        }

        // Copia a mensagem inteira para colar em qualquer outra rede
        function copiarTexto() {
            navigator.clipboard.writeText(TEXTO_MENSAGEM).then(() => {
                const alerta = document.getElementById('copiadoAlerta');
                alerta.style.display = 'block';
                setTimeout(() => {
                    alerta.style.display = 'none';
                    fecharCard();
                }, 1500);
            }).catch(err => {
                alert("Não foi possível copiar. Selecione e copie manualmente.");
            });
        }
    </script>

</body>
</html>
