<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lindos Horizontes</title>
    
    <!-- Link para carregar os ícones do Font Awesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }

        #modalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        #modalOverlay.ativo {
            opacity: 1;
            visibility: visible;
        }

        .card-flutuante {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 360px;
            width: 85%;
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #modalOverlay.ativo .card-flutuante {
            transform: scale(1);
        }

        .botao-fechar {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 32px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }

        .emoji-topo {
            font-size: 45px;
            margin-bottom: 10px;
            display: block;
        }
        
        .card-flutuante h2 {
            margin: 10px 0;
            color: #1a1a1a;
            font-size: 22px;
        }
        
        .card-flutuante p {
            color: #555;
            line-height: 1.5;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .opcoes-share {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-share {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s, transform 0.2s;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-share:active {
            transform: scale(0.98);
        }

        .whatsapp { background-color: #25D366; }
        .whatsapp:hover { background-color: #1ebd5c; }
        
        .whatsapp-status { background-color: #128C7E; }
        .whatsapp-status:hover { background-color: #075e54; }
    </style>
</head>
<body>

    <div style="padding: 40px; text-align: center; color: #333;">
        <h1>Seu Site Incrível</h1>
        <p>As pessoas verão este conteúdo ao fundo assim que fecharem o card.</p>
    </div>

    <div id="modalOverlay">
        <div class="card-flutuante">
            <button class="botao-fechar" onclick="fecharCard()" aria-label="Fechar">&times;</button>
            <span class="emoji-topo">🚀</span>
            <h2>Me dá essa força?</h2>
            <p>Fico muito feliz por você estar aqui! Este é o meu novo projeto. Se puder me ajudar a divulgar, escolha uma opção abaixo:</p>
            
            <div class="opcoes-share">
                <!-- Botão 1 com ícone do WhatsApp -->
                <button id="linkZap" class="btn-share whatsapp">
                    <i class="fab fa-whatsapp"></i> Enviar para um amigo
                </button>

                <!-- Botão 2 com ícone do WhatsApp -->
                <button id="linkStatus" class="btn-share whatsapp-status">
                    <i class="fab fa-whatsapp"></i> Postar no meu Status
                </button>
            </div>
        </div>
    </div>

    <script>
        const TEXTO_MENSAGEM = "Olha esse projeto incrível! 🚀\n\nAchei muito maneiro o site do Lindos Horizontes que estão fazendo e resolvi apoiar! Dá uma olhada você também:\n\n👉 https://github.io";
        const mensagemCodificada = encodeURIComponent(TEXTO_MENSAGEM);

        function abrirWhatsapp() {
            const linkApi = "https://whatsapp.com" + mensagemCodificada;
            window.open(linkApi, '_blank');
        }

        document.getElementById('linkZap').onclick = function() {
            abrirWhatsapp();
        };

        document.getElementById('linkStatus').onclick = function() {
            abrirWhatsapp();
        };

        window.onload = function() {
            setTimeout(function() {
                document.getElementById('modalOverlay').classList.add('ativo');
            }, 1500); 
        };

        function fecharCard() {
            document.getElementById('modalOverlay').classList.remove('ativo');
        }
    </script>

</body>
</html>
