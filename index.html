<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lindos Horizontes</title>
    
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }

        /* 1. FUNDO ESCURO */
        #modalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        #modalOverlay.ativo {
            opacity: 1;
            visibility: visible;
        }

        /* 2. CARD FLUTUANTE */
        .card-flutuante {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 360px;
            width: 85%;
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #modalOverlay.ativo .card-flutuante {
            transform: scale(1);
        }

        /* BOTÃO FECHAR */
        .botao-fechar {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 32px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }

        /* TEXTOS */
        .emoji-topo {
            font-size: 45px;
            margin-bottom: 10px;
            display: block;
        }
        
        .card-flutuante h2 {
            margin: 10px 0;
            color: #1a1a1a;
            font-size: 22px;
        }
        
        .card-flutuante p {
            color: #555;
            line-height: 1.5;
            font-size: 15px;
            margin-bottom: 25px;
        }

        /* OPÇÕES DE COMPARTILHAMENTO */
        .opcoes-share {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-share {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s, transform 0.2s;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-share:active {
            transform: scale(0.98);
        }

        /* Cores das Redes */
        .whatsapp { background-color: #25D366; }
        .whatsapp:hover { background-color: #1ebd5c; }
        
        .whatsapp-status { background-color: #128C7E; }
        .whatsapp-status:hover { background-color: #075e54; }

        /* Ícones SVG do Whatsapp */
        .btn-share svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
    </style>
</head>
<body>

    <!-- Conteúdo do seu site -->
    <div style="padding: 40px; text-align: center; color: #333;">
        <h1>Seu Site Incrível</h1>
        <p>As pessoas verão este conteúdo ao fundo assim que fecharem o card.</p>
    </div>

    <!-- ESTRUTURA DO CARD -->
    <div id="modalOverlay">
        <div class="card-flutuante">
            <button class="botao-fechar" onclick="fecharCard()">&times;</button>
            <span class="emoji-topo">🚀</span>
            <h2>Me dá essa força?</h2>
            <p>"Fico muito feliz por você estar aqui! Antes de conferir o meu trabalho, por favor, me ajude a divulgá-lo.</p>
            
            <div class="opcoes-share">
                <!-- Botão 1: Direto via Link -->
                <a id="linkZap" href="#" class="btn-share whatsapp">
                    <svg viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l114.1-29.9c32.4 17.4 68.8 26.5 106.2 26.5h.1c122.4 0 222-99.6 222-222.1 0-59.3-23.2-115-65.1-157.5zM224 438c-33.1 0-65.6-8.9-94-25.7l-6.7-4-69.8 18.3 18.7-68.1-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54 81.2 54 130.5-.1 101.7-82.9 184.5-184.6 184.5zm100.5-137.5c-5.5-2.8-32.6-16.1-37.7-17.9-5.1-1.8-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.6-13.4 37.2-26.3 4.6-13 4.6-24.1 3.2-26.3-1.4-2.2-5-3.6-10.5-6.4z"/></svg> 
                    Enviar para um amigo
                </a>

                <!-- Botão 2: Direto via Link -->
                <a id="linkStatus" href="#" class="btn-share whatsapp-status">
                    <svg viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l114.1-29.9c32.4 17.4 68.8 26.5 106.2 26.5h.1c122.4 0 222-99.6 222-222.1 0-59.3-23.2-115-65.1-157.5zM224 438c-33.1 0-65.6-8.9-94-25.7l-6.7-4-69.8 18.3 18.7-68.1-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54 81.2 54 130.5-.1 101.7-82.9 184.5-184.6 184.5zm100.5-137.5c-5.5-2.8-32.6-16.1-37.7-17.9-5.1-1.8-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.6-13.4 37.2-26.3 4.6-13 4.6-24.1 3.2-26.3-1.4-2.2-5-3.6-10.5-6.4z"/></svg> 
                    Postar no meu Status
                </a>
            </div>
        </div>
    </div>

    <!-- SCRIPT CORRIGIDO -->
    <script>
        // 1. CONFIGURAÇÃO DA SUA MENSAGEM COM O SEU LINK REAL
        const TEXTO_MENSAGEM = "Olha esse projeto incrível! 🚀\n\Achei muito maneiro a iniciativa deste jovem e resolvi apoiar! Dá uma olhada você também.\n\n👉 https://arturvilanova.github.io/lindos-horizontes/index.html";

        const mensagemCodificada = encodeURIComponent(TEXTO_MENSAGEM);

        // 2. MONTA A ROTA OFICIAL DE COMPARTILHAMENTO
        const linkApi = "https://api.whatsapp.com/send?text=" + mensagemCodificada;

        // Injeta a rota diretamente no atributo href do HTML para o navegador não travar
        document.getElementById('linkZap').href = linkApi;
        document.getElementById('linkStatus').href = linkApi;

        // Abre o card automaticamente 1.5 segundos após carregar a página
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('modalOverlay').classList.add('ativo');
            }, 1500); 
        };

        // Fecha o card
        function fecharCard() {
            document.getElementById('modalOverlay').classList.remove('ativo');
        }
    </script>

</body>
</html>
